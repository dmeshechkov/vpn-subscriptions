name: Hourly VPN Update

on:
  schedule:
    - cron: '0 * * * *'  # Каждый час в 0 минут
  workflow_dispatch:  # Ручной запуск

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        pip install aiohttp
        
    - name: Run aggregator
      run: |
        python aggregator.py --max-configs 10 --timeout 5
        
    - name: Commit and push if changed
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add subscriptions/
        git diff --quiet && git diff --staged --quiet || (git commit -m "Hourly update: top 10 configs" && git push)
