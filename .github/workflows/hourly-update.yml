name: Hourly VPN Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Debug - show Python version and files
      run: |
        python --version
        pip --version
        echo "Files in repository:"
        ls -la
        echo "First 10 lines of aggregator.py:"
        head -10 aggregator.py
        
    - name: Install dependencies
      run: |
        pip install requests
        pip list | grep requests
        
    - name: Run aggregator
      run: |
        python aggregator.py
